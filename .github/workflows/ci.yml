name: Train and Deploy Model

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn==1.6.0 pandas==2.2.3 numpy==2.2.1 imbalanced-learn==0.12.3 joblib==1.4.2 dagshub==0.3.4

      - name: Run MLflow Project
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
          MLFLOW_TRACKING_USERNAME: DimasTawaqqal
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_USER_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/DimasTawaqqal/bankmarketing-mlflow.mlflow
        run: |
          python MLProject/modelling.py --n_estimators 100 --max_depth 10

      - name: Build and Push Docker Image
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_ACCESS_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
        run: |
          # Login ke Docker Hub
          echo "${DOCKER_HUB_ACCESS_TOKEN}" | docker login -u "${DOCKER_HUB_USERNAME}" --password-stdin

          # Ambil Run ID terbaru dari MLflow secara dinamis
          RUN_ID=$(python - <<'EOF'
          import mlflow
          import os

          os.environ["MLFLOW_TRACKING_USERNAME"] = "DimasTawaqqal"
          os.environ["MLFLOW_TRACKING_PASSWORD"] = os.environ["DAGSHUB_USER_TOKEN"]
          mlflow.set_tracking_uri("https://dagshub.com/DimasTawaqqal/bankmarketing-mlflow.mlflow")

          client = mlflow.tracking.MlflowClient()
          experiment = client.get_experiment_by_name("Default")
          runs = client.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=["start_time DESC"],
              max_results=1
          )
          print(runs[0].info.run_id)
          EOF
          )

          echo "Using Run ID: $RUN_ID"

          # Build Docker image dari model MLflow
          mlflow models build-docker \
            -m "runs:/${RUN_ID}/model" \
            -n "${DOCKER_HUB_USERNAME}/bank-marketing-model:latest" \
            --enable-mlserver

          # Push image ke Docker Hub
          docker push "${DOCKER_HUB_USERNAME}/bank-marketing-model:latest"